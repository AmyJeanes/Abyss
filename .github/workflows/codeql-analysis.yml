name: "CodeQL"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 5'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    
    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v5
      with:
        dotnet-version: 9.x
      
    - name: Initialize CodeQL
      uses: github/codeql-action/init@c793b717bc78562f491db7b0e93a3a178b099162 # v4
      with:
        languages: csharp, javascript
        
    - name: Autobuild
      uses: github/codeql-action/autobuild@c793b717bc78562f491db7b0e93a3a178b099162 # v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@c793b717bc78562f491db7b0e93a3a178b099162 # v4
